<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/x-icon" href="images/favicon.ico">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
	<title>Project Graph — Carey Linda Crooks</title>
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }

		body {
			font-family: 'Inter', 'Space Grotesk', sans-serif;
			background-color: #fefdf9;
			color: #2c2420;
			height: 100vh;
			overflow: hidden;
			display: flex;
			flex-direction: column;
		}

		.graph-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			padding: 24px 40px;
			z-index: 10;
		}

		.graph-header a { color: #2c2420; text-decoration: none; }
		.graph-header a:hover { text-decoration: underline; text-decoration-color: #c4b5aa; }

		.logo { width: 28px; height: 21px; display: block; }

		.graph-title {
			font-size: 13px;
			font-weight: 600;
			letter-spacing: 1.5px;
			text-transform: uppercase;
			color: #8a7568;
		}

		canvas {
			flex: 1;
			display: block;
			cursor: grab;
		}

		canvas:active { cursor: grabbing; }

		/* Tooltip */
		.tooltip {
			position: fixed;
			pointer-events: none;
			background: #2c2420;
			color: #fefdf9;
			padding: 12px 16px;
			font-size: 13px;
			line-height: 1.5;
			max-width: 280px;
			opacity: 0;
			transition: opacity 0.2s ease;
			z-index: 100;
		}

		.tooltip.visible { opacity: 1; }

		.tooltip-title {
			font-weight: 600;
			margin-bottom: 4px;
		}

		.tooltip-tags {
			color: #c4b5aa;
			font-size: 11px;
			letter-spacing: 0.5px;
			margin-top: 6px;
		}

		/* Legend */
		.legend {
			position: fixed;
			bottom: 24px;
			left: 40px;
			display: flex;
			gap: 20px;
			font-size: 11px;
			letter-spacing: 0.5px;
			color: #8a7568;
			z-index: 10;
		}

		.legend-item {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.legend-dot {
			width: 14px;
			height: 11px;
			-webkit-mask: url('images/einstein.svg') no-repeat center / contain;
			mask: url('images/einstein.svg') no-repeat center / contain;
		}
	</style>
</head>
<body>

	<div class="graph-header">
		<a href="index.html"><img class="logo" src="images/einstein.svg" alt="Home"></a>
		<span class="graph-title">Project Graph</span>
	</div>

	<canvas id="graph"></canvas>

	<div class="tooltip" id="tooltip">
		<div class="tooltip-title" id="tooltipTitle"></div>
		<div id="tooltipDesc"></div>
		<div class="tooltip-tags" id="tooltipTags"></div>
	</div>

	<div class="legend">
		<div class="legend-item"><div class="legend-dot" style="background:#b07d62"></div> Product Design</div>
		<div class="legend-item"><div class="legend-dot" style="background:#6b8f7b"></div> Installation</div>
		<div class="legend-item"><div class="legend-dot" style="background:#8b7ea8"></div> Painting</div>
	</div>

	<script>
	const canvas = document.getElementById('graph');
	const ctx = canvas.getContext('2d');
	const tooltip = document.getElementById('tooltip');
	const tooltipTitle = document.getElementById('tooltipTitle');
	const tooltipDesc = document.getElementById('tooltipDesc');
	const tooltipTags = document.getElementById('tooltipTags');

	const dpr = window.devicePixelRatio || 1;

	function resize() {
		canvas.width = canvas.offsetWidth * dpr;
		canvas.height = canvas.offsetHeight * dpr;
		ctx.scale(dpr, dpr);
	}
	resize();
	window.addEventListener('resize', resize);

	// --- Project data ---
	const categories = {
		product: '#b07d62',
		installation: '#6b8f7b',
		painting: '#8b7ea8'
	};

	const nodes = [
		{
			id: 'responsible-data',
			label: 'Responsible\nData Collection',
			category: 'product',
			tags: ['AI', 'data ethics', 'product strategy', 'React'],
			subtitle: 'Designing transparent data practices',
			href: 'responsibledata.html',
			x: 0, y: 0, vx: 0, vy: 0
		},
		{
			id: 'fira',
			label: 'Food Innovation\nRegulatory Assistant',
			category: 'product',
			tags: ['AI', 'regulation', 'UX research', 'Python'],
			subtitle: 'Navigating food regulation with AI',
			href: '#',
			x: 0, y: 0, vx: 0, vy: 0
		},
		{
			id: 'ai-education',
			label: 'Learning\nInterfaces',
			category: 'product',
			tags: ['AI', 'education', 'ML toolkit', 'curriculum'],
			subtitle: 'Adaptive interfaces for education',
			href: 'aixeducation.html',
			x: 0, y: 0, vx: 0, vy: 0
		},
		{
			id: 'animating-kindness',
			label: 'Animating\nKindness',
			category: 'installation',
			tags: ['AI', 'data ethics', 'participatory', 'GPT4o', 'philanthropy'],
			subtitle: 'Prototyping philanthropic model shaping',
			href: 'animatingkindness.html',
			x: 0, y: 0, vx: 0, vy: 0
		},
		{
			id: 'contextual-normalcy',
			label: 'Contextual\nNormalcy',
			category: 'installation',
			tags: ['AI', 'ML', 'participatory', 'sound', 'P5.JS', 'wellbeing'],
			subtitle: 'Audio-visual experience for emotional release',
			href: 'contextualnormalcy.html',
			x: 0, y: 0, vx: 0, vy: 0
		},
		{
			id: 'art-search',
			label: 'Art Search',
			category: 'installation',
			tags: ['AI', 'ML', 'bias', 'archival', 'DeepFace', 'React'],
			subtitle: 'Interfaces for archival search using DeepFace',
			href: 'artsearch.html',
			x: 0, y: 0, vx: 0, vy: 0
		},
		{
			id: 'transforming-transmissions',
			label: 'Transforming\nTransmissions',
			category: 'installation',
			tags: ['AI', 'data ethics', 'consent', 'sound', 'GPT4o', 'P5.JS', 'generative'],
			subtitle: 'Nuanced data sharing for generative media',
			href: 'transformingtransmissions.html',
			x: 0, y: 0, vx: 0, vy: 0
		},
		{
			id: 'martian-landscapes',
			label: 'Martian\nLandscapes',
			category: 'painting',
			tags: ['landscape', 'oil on canvas', 'geological form'],
			subtitle: 'Imagined terrains of a red planet',
			href: '#',
			x: 0, y: 0, vx: 0, vy: 0
		},
		{
			id: 'rock-collection',
			label: 'Rock\nCollection',
			category: 'painting',
			tags: ['geological form', 'oil on canvas', 'material study'],
			subtitle: 'Studies of geological form',
			href: '#',
			x: 0, y: 0, vx: 0, vy: 0
		},
		{
			id: 'molehill-mountains',
			label: 'Molehill\nMountains',
			category: 'painting',
			tags: ['landscape', 'oil on canvas', 'scale', 'geological form'],
			subtitle: 'Monumentalizing the mundane',
			href: '#',
			x: 0, y: 0, vx: 0, vy: 0
		}
	];

	// --- Compute edges from shared tags ---
	const edges = [];
	for (let i = 0; i < nodes.length; i++) {
		for (let j = i + 1; j < nodes.length; j++) {
			const shared = nodes[i].tags.filter(t => nodes[j].tags.includes(t));
			if (shared.length > 0) {
				edges.push({
					source: i,
					target: j,
					weight: shared.length,
					tags: shared
				});
			}
		}
	}

	// --- Initial positions: scatter around center ---
	const W = () => canvas.offsetWidth;
	const H = () => canvas.offsetHeight;

	function initPositions() {
		const cx = W() / 2;
		const cy = H() / 2;
		const spread = Math.min(W(), H()) * 0.3;
		nodes.forEach((n, i) => {
			const angle = (i / nodes.length) * Math.PI * 2;
			n.x = cx + Math.cos(angle) * spread + (Math.random() - 0.5) * 60;
			n.y = cy + Math.sin(angle) * spread + (Math.random() - 0.5) * 60;
		});
	}
	initPositions();

	// --- Force simulation ---
	const SIM = {
		repulsion: 3000,
		attraction: 0.008,
		edgeLength: 180,
		damping: 0.85,
		centerGravity: 0.002
	};

	function simulate() {
		const cx = W() / 2;
		const cy = H() / 2;

		// Repulsion between all nodes
		for (let i = 0; i < nodes.length; i++) {
			for (let j = i + 1; j < nodes.length; j++) {
				let dx = nodes[j].x - nodes[i].x;
				let dy = nodes[j].y - nodes[i].y;
				let dist = Math.sqrt(dx * dx + dy * dy) || 1;
				let force = SIM.repulsion / (dist * dist);
				let fx = (dx / dist) * force;
				let fy = (dy / dist) * force;
				nodes[i].vx -= fx;
				nodes[i].vy -= fy;
				nodes[j].vx += fx;
				nodes[j].vy += fy;
			}
		}

		// Attraction along edges
		edges.forEach(e => {
			const a = nodes[e.source];
			const b = nodes[e.target];
			let dx = b.x - a.x;
			let dy = b.y - a.y;
			let dist = Math.sqrt(dx * dx + dy * dy) || 1;
			// Stronger attraction for more shared tags
			let strength = SIM.attraction * e.weight;
			let displacement = dist - SIM.edgeLength / e.weight;
			let fx = (dx / dist) * displacement * strength;
			let fy = (dy / dist) * displacement * strength;
			a.vx += fx;
			a.vy += fy;
			b.vx -= fx;
			b.vy -= fy;
		});

		// Center gravity
		nodes.forEach(n => {
			n.vx += (cx - n.x) * SIM.centerGravity;
			n.vy += (cy - n.y) * SIM.centerGravity;
		});

		// Apply velocity
		nodes.forEach(n => {
			if (n === dragNode) return;
			n.vx *= SIM.damping;
			n.vy *= SIM.damping;
			n.x += n.vx;
			n.y += n.vy;

			// Keep in bounds
			const pad = 60;
			n.x = Math.max(pad, Math.min(W() - pad, n.x));
			n.y = Math.max(pad, Math.min(H() - pad, n.y));
		});
	}

	// --- Einstein SVG shape as tinted images ---
	const svgPath = 'M26.75 11.6123L35 6.78566L32.2636 2.0205L21.2364 2.0205L18.4898 6.82664L10.2602 2L2 6.7959L4.72617 11.6123L10.2398 11.6123L10.1683 21.1938L18.5 26L21.2364 21.1939L26.75 21.1939L26.75 11.6123Z';

	function makeTintedSVG(color) {
		const svg = `<svg width="37" height="28" viewBox="0 0 37 28" fill="none" xmlns="http://www.w3.org/2000/svg">
			<path d="${svgPath}" fill="${color}" stroke="${color}" stroke-width="2" stroke-miterlimit="10"/>
		</svg>`;
		const img = new Image();
		img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
		return img;
	}

	const einsteinImages = {};
	Object.entries(categories).forEach(([key, color]) => {
		einsteinImages[key] = makeTintedSVG(color);
	});

	// --- Drawing ---
	function getNodeRadius(node) {
		return node.tags.length * 3 + 14;
	}

	function draw() {
		ctx.clearRect(0, 0, W(), H());

		// Draw edges
		edges.forEach(e => {
			const a = nodes[e.source];
			const b = nodes[e.target];
			const isHighlight = hoverNode && (a === hoverNode || b === hoverNode);

			ctx.beginPath();
			ctx.moveTo(a.x, a.y);
			ctx.lineTo(b.x, b.y);

			if (isHighlight) {
				ctx.strokeStyle = `rgba(44, 36, 32, ${0.15 + e.weight * 0.08})`;
				ctx.lineWidth = 1 + e.weight * 0.5;
			} else if (hoverNode) {
				ctx.strokeStyle = 'rgba(44, 36, 32, 0.04)';
				ctx.lineWidth = 1;
			} else {
				ctx.strokeStyle = `rgba(44, 36, 32, ${0.06 + e.weight * 0.03})`;
				ctx.lineWidth = 1;
			}
			ctx.stroke();

			// Draw shared tag count on edge if highlighted
			if (isHighlight && e.weight > 1) {
				const mx = (a.x + b.x) / 2;
				const my = (a.y + b.y) / 2;
				ctx.font = '10px Inter, sans-serif';
				ctx.fillStyle = '#8a7568';
				ctx.textAlign = 'center';
				ctx.textBaseline = 'middle';
				ctx.fillText(e.weight, mx, my - 8);
			}
		});

		// Draw nodes as einstein SVG shapes
		nodes.forEach(node => {
			const r = getNodeRadius(node);
			const isHover = node === hoverNode;
			const isConnected = hoverNode && edges.some(e =>
				(nodes[e.source] === hoverNode && nodes[e.target] === node) ||
				(nodes[e.target] === hoverNode && nodes[e.source] === node)
			);
			const dimmed = hoverNode && !isHover && !isConnected;

			const img = einsteinImages[node.category];
			// Scale SVG proportional to node radius
			const scale = (r * 2) / 28; // 28 is the SVG's native height
			const drawW = 37 * scale;
			const drawH = 28 * scale;

			if (isHover) {
				ctx.globalAlpha = 1;
			} else if (dimmed) {
				ctx.globalAlpha = 0.15;
			} else {
				ctx.globalAlpha = 0.6;
			}

			ctx.drawImage(img, node.x - drawW / 2, node.y - drawH / 2, drawW, drawH);
			ctx.globalAlpha = 1;

			// Node label
			const lines = node.label.split('\n');
			ctx.textAlign = 'center';
			ctx.textBaseline = 'middle';

			if (dimmed) {
				ctx.globalAlpha = 0.2;
			} else if (isHover) {
				ctx.globalAlpha = 1;
			} else {
				ctx.globalAlpha = 0.85;
			}

			ctx.font = '600 12px Inter, sans-serif';
			ctx.fillStyle = '#2c2420';
			const lineHeight = 15;
			const startY = node.y + drawH / 2 + 14 - ((lines.length - 1) * lineHeight) / 2;
			lines.forEach((line, i) => {
				ctx.fillText(line, node.x, startY + i * lineHeight);
			});

			ctx.globalAlpha = 1;
		});
	}

	// --- Interaction ---
	let hoverNode = null;
	let dragNode = null;
	let dragOffset = { x: 0, y: 0 };

	function getNodeAt(mx, my) {
		for (let i = nodes.length - 1; i >= 0; i--) {
			const n = nodes[i];
			const r = getNodeRadius(n);
			const scale = (r * 2) / 28;
			const hw = (37 * scale) / 2 + 4;
			const hh = (28 * scale) / 2 + 4;
			if (Math.abs(mx - n.x) < hw && Math.abs(my - n.y) < hh) return n;
		}
		return null;
	}

	canvas.addEventListener('mousemove', e => {
		const rect = canvas.getBoundingClientRect();
		const mx = e.clientX - rect.left;
		const my = e.clientY - rect.top;

		if (dragNode) {
			dragNode.x = mx - dragOffset.x;
			dragNode.y = my - dragOffset.y;
			dragNode.vx = 0;
			dragNode.vy = 0;
			return;
		}

		const node = getNodeAt(mx, my);
		hoverNode = node;
		canvas.style.cursor = node ? 'pointer' : 'grab';

		if (node) {
			const connectedEdges = edges.filter(e =>
				nodes[e.source] === node || nodes[e.target] === node
			);
			const allSharedTags = [...new Set(connectedEdges.flatMap(e => e.tags))];

			tooltipTitle.textContent = node.label.replace('\n', ' ');
			tooltipDesc.textContent = node.subtitle;
			tooltipTags.textContent = allSharedTags.join(' · ');

			tooltip.classList.add('visible');
			let tx = e.clientX + 16;
			let ty = e.clientY + 16;
			if (tx + 280 > window.innerWidth) tx = e.clientX - 296;
			if (ty + 100 > window.innerHeight) ty = e.clientY - 100;
			tooltip.style.left = tx + 'px';
			tooltip.style.top = ty + 'px';
		} else {
			tooltip.classList.remove('visible');
		}
	});

	canvas.addEventListener('mousedown', e => {
		const rect = canvas.getBoundingClientRect();
		const mx = e.clientX - rect.left;
		const my = e.clientY - rect.top;
		const node = getNodeAt(mx, my);
		if (node) {
			dragNode = node;
			dragOffset.x = mx - node.x;
			dragOffset.y = my - node.y;
			canvas.style.cursor = 'grabbing';
		}
	});

	canvas.addEventListener('mouseup', () => {
		dragNode = null;
	});

	canvas.addEventListener('mouseleave', () => {
		hoverNode = null;
		dragNode = null;
		tooltip.classList.remove('visible');
	});

	canvas.addEventListener('click', e => {
		if (dragNode) return;
		const rect = canvas.getBoundingClientRect();
		const mx = e.clientX - rect.left;
		const my = e.clientY - rect.top;
		const node = getNodeAt(mx, my);
		if (node && node.href !== '#') {
			window.location.href = node.href;
		}
	});

	// --- Animation loop ---
	function loop() {
		simulate();
		draw();
		requestAnimationFrame(loop);
	}
	loop();
	</script>

</body>
</html>
