<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<link rel="icon" type="image/svg+xml" href="images/einstein.svg">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&display=swap" rel="stylesheet">
	<style>
* {
	box-sizing: border-box;
	margin: 0;
	padding: 0;
}

html, body {
	width: 100%;
	height: 100%;
	cursor: none;
}

body {
	font-family: 'Inter', sans-serif;
	font-weight: 400;
	background: #fefdf9;
	color: #2c2420;
	overflow: hidden;
}

a { color: inherit; text-decoration: none; cursor: none; }

.filters-def {
	position: absolute;
	width: 0;
	height: 0;
	overflow: hidden;
	pointer-events: none;
}

.scene {
	position: fixed;
	inset: 0;
	z-index: 0;
	cursor: none;
}

.painting {
	position: absolute;
	inset: 0;
	background:
		url('images/PXL_20260223_202538116.RAW-01.COVER (1).jpg')
		center / cover;
}

.frost {
	position: absolute;
	inset: -40px;
	background:
		url('images/PXL_20260223_202538116.RAW-01.COVER (1).jpg')
		center / cover;
	filter: blur(22px) saturate(0.5) brightness(1.15);
}

.frost-tint {
	position: absolute;
	inset: 0;
	background: rgba(254, 253, 249, 0.52);
}

.byline {
	position: absolute;
	bottom: 36px;
	left: 40px;
	z-index: 2;
	display: flex;
	flex-direction: column;
	gap: 4px;
	pointer-events: none;
}

.byline-name {
	font-size: 12px;
	font-weight: 400;
	letter-spacing: 0.3px;
	color: rgba(44, 36, 32, 0.45);
}

.byline-sub {
	font-size: 10px;
	letter-spacing: 1.5px;
	text-transform: uppercase;
	color: rgba(44, 36, 32, 0.2);
}

/* ── Contact / commission overlay ──────────────────── */
.contact-scrim {
	position: fixed;
	inset: 0;
	z-index: 16;
	background: rgba(18, 14, 12, 0.48);
	opacity: 0;
	pointer-events: none;
	transition: opacity 0.6s ease;
}

.contact-scrim.is-open {
	opacity: 1;
	pointer-events: auto;
}

.contact-overlay {
	position: fixed;
	inset: 0;
	z-index: 17;
	display: flex;
	align-items: center;
	justify-content: center;
	opacity: 0;
	pointer-events: none;
	transition: opacity 0.45s ease;
}

.contact-overlay.is-open {
	opacity: 1;
	pointer-events: auto;
}

.contact-card {
	width: 52%;
	max-width: 680px;
	background: rgba(255, 255, 255, 0.10);
	backdrop-filter: blur(28px) saturate(1.1);
	-webkit-backdrop-filter: blur(28px) saturate(1.1);
	border: 1px solid rgba(255, 255, 255, 0.22);
	border-radius: 40px;
	padding: 56px 60px;
	transform: scale(0.96);
	transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
	overflow: hidden;
}

.contact-overlay.is-open .contact-card {
	transform: scale(1);
}

.social-links {
	position: fixed;
	bottom: 36px;
	right: 40px;
	z-index: 5;
	display: flex;
	flex-direction: column;
	align-items: flex-end;
	gap: 4px;
}

.social-links a {
	font-size: 12px;
	font-weight: 400;
	letter-spacing: 0.3px;
	color: rgba(44, 36, 32, 0.45);
	text-decoration: none;
	cursor: pointer;
	transition: color 0.2s ease;
}

.social-links a:hover {
	color: rgba(44, 36, 32, 0.85);
}

/* Transparent footer hit-area — restores OS cursor across the bottom strip */
.footer-zone {
	position: fixed;
	bottom: 0;
	left: 0;
	right: 0;
	height: 11vh;
	z-index: 4;
	cursor: default;
}

.zone {
	position: fixed;
	z-index: 1;
	display: block;
	cursor: none;
}

.zone-about {
	top: 0; left: 0; right: 0;
	height: 36%;
}

.zone-design {
	top: 36%; left: 0;
	width: 52%; bottom: 0;
}

.zone-art {
	top: 36%; left: 52%;
	right: 0; bottom: 0;
}

.lens {
	position: fixed;
	width: 240px;
	height: 300px;
	z-index: 10;
	pointer-events: none;
	opacity: 0;
	transition: opacity 0.6s ease;
}

.lens.is-visible {
	opacity: 1;
}

.lens-clear,
.lens-sheen {
	position: absolute;
	inset: 0;
	clip-path: path('M 120,18 C 162,15 222,95 232,195 C 240,248 218,278 172,282 C 128,286 65,284 22,280 C -15,274 -12,228 15,168 C 38,95 82,20 120,18 Z');
	transition: clip-path 0.75s cubic-bezier(0.4, 0, 0.2, 1);
}

.lens-edge path {
	transition: d 0.75s cubic-bezier(0.4, 0, 0.2, 1);
}

.lens-clear {
	overflow: hidden;
	filter: url(#glass-distort) brightness(1.06) saturate(1.04);
}

.lens-img {
	position: absolute;
	object-fit: cover;
	object-position: center;
	display: block;
	pointer-events: none;
}

.lens-sheen {
	background: radial-gradient(
		ellipse 60% 40% at 65% 22%,
		rgba(255, 255, 255, 0.18) 0%,
		transparent 70%
	);
	mix-blend-mode: overlay;
}

.lens-edge {
	position: absolute;
	inset: 0;
	width: 100%;
	height: 100%;
	pointer-events: none;
}

.lens-label {
	position: absolute;
	top: 50%;
	left: 50%;
	transform: translate(-50%, -50%);
	font-size: 20px;
	font-weight: 400;
	letter-spacing: 0.3px;
	color: rgba(255, 255, 255, 0.96);
	text-shadow: 0 1px 12px rgba(0, 0, 0, 0.35);
	white-space: nowrap;
	pointer-events: none;
	transition: opacity 0.15s ease, transform 0.15s ease;
}

.lens-label.label-fade {
	opacity: 0;
	transform: translate(-50%, calc(-50% + 4px));
}

.about-overlay {
	position: fixed;
	inset: 0;
	z-index: 15;
	display: flex;
	align-items: center;
	justify-content: center;
	opacity: 0;
	pointer-events: none;
	transition: opacity 0.45s ease;
}

.about-overlay.is-open {
	opacity: 1;
	pointer-events: auto;
}

.about-scrim {
	position: fixed;
	inset: 0;
	z-index: 14;
	background: rgba(18, 14, 12, 0.48);
	opacity: 0;
	pointer-events: none;
	transition: opacity 0.6s ease;
}

.about-scrim.is-open {
	opacity: 1;
	pointer-events: auto;
}

.about-card {
	width: 50%;
	max-width: 660px;
	background: rgba(255, 255, 255, 0.10);
	backdrop-filter: blur(28px) saturate(1.1);
	-webkit-backdrop-filter: blur(28px) saturate(1.1);
	border: 1px solid rgba(255, 255, 255, 0.22);
	border-radius: 40px;
	padding: 64px 68px;
	transform: scale(0.96);
	transition: transform 0.5s cubic-bezier(0.34, 1.2, 0.64, 1);
}

.about-overlay.is-open .about-card {
	transform: scale(1);
}

.about-card-text {
	font-size: 28px;
	font-weight: 400;
	line-height: 1.45;
	color: rgba(255, 255, 255, 0.92);
	margin-bottom: 40px;
}

.about-card-links {
	display: flex;
	align-items: baseline;
	gap: 14px;
	font-size: 14px;
	color: rgba(255, 255, 255, 0.35);
}

.about-card-links a {
	color: rgba(255, 255, 255, 0.60);
	text-decoration: underline;
	text-decoration-color: rgba(255, 255, 255, 0.25);
	text-underline-offset: 3px;
	cursor: none;
	transition: color 0.2s, text-decoration-color 0.2s;
}

.about-card-links a:hover {
	color: rgba(255, 255, 255, 0.92);
	text-decoration-color: rgba(255, 255, 255, 0.55);
}

.about-commissions-btn {
	display: inline-block;
	margin-top: 28px;
	font-size: 12px;
	color: rgba(255, 255, 255, 0.35);
	text-decoration: underline;
	text-decoration-color: rgba(255, 255, 255, 0.15);
	text-underline-offset: 3px;
	cursor: pointer;
	background: none;
	border: none;
	font-family: inherit;
	padding: 0;
	transition: color 0.2s ease, text-decoration-color 0.2s ease;
}

.about-commissions-btn:hover {
	color: rgba(255, 255, 255, 0.80);
	text-decoration-color: rgba(255, 255, 255, 0.45);
}

.gyro-prompt {
	display: none;
	position: fixed;
	bottom: 36px;
	left: 50%;
	transform: translateX(-50%);
	z-index: 20;
	font-family: 'Inter', sans-serif;
	font-size: 10px;
	letter-spacing: 1.5px;
	text-transform: uppercase;
	color: rgba(44, 36, 32, 0.4);
	white-space: nowrap;
	cursor: pointer;
	padding: 20px 28px;
	transition: opacity 0.5s ease;
}

.gyro-prompt.hidden {
	opacity: 0;
	pointer-events: none;
}

/* ── Mobile home — Figma 338-554 ──────────────────── */
.mobile-home {
	display: none;
	position: fixed;
	inset: 0;
	z-index: 5;
	overflow: hidden;
}

/* Grouped SVG blobs — exported from Figma with shape + text baked in */
.m-svg {
	position: absolute;
	display: block;
	will-change: transform;
}
.m-svg img {
	width: 100%;
	height: 100%;
	display: block;
}

/* Bio: full width, top of screen */
#bioBlob {
	left: 0;
	top: 0;
	width: 100%;
	height: auto;
	pointer-events: none;
	z-index: 3;
}
#bioBlob img {
	height: auto;
}

/* Design nav: left side, below bio */
#navGroupDesign {
	left: 0;
	top: 40.4%;
	width: 53.3%;
	z-index: 2;
}

/* Art nav: right side, below design */
#navGroupArt {
	left: 46.2%;
	top: 52%;
	width: 53.8%;
	z-index: 1;
}

/* Commissions — anchored to bottom */
.m-commissions {
	position: absolute;
	left: 31px;
	bottom: calc(32px + env(safe-area-inset-bottom, 0px));
	color: rgba(47, 34, 34, 0.54);
	font-size: 16px;
	line-height: 1.4;
	background: none;
	border: none;
	padding: 0;
	cursor: pointer;
	text-align: left;
	font-family: 'Inter', sans-serif;
	font-weight: 400;
	z-index: 4;
	opacity: 0;
	transition: opacity 0.8s ease 0.3s;
}
.m-commissions.is-visible { opacity: 1; }

@media (hover: none) {
	html, body { cursor: auto; }
	a { cursor: auto; }
	.scene { cursor: auto; }
	.byline-sub { display: none; }
	/* Hide lens on touch — shown only when gyro is active */
	.lens { display: none; }
}

@media (max-width: 768px) {
	/* Show mobile home, hide desktop-specific chrome */
	.mobile-home { display: block; }
	.zone, .social-links, .gyro-prompt, .footer-zone, .byline { display: none; }

	/* Mobile background — image 28 with glass blur + warm tint on top */
	.painting { background: url('images/image 28.png') center / cover no-repeat; }
	.frost      { background: none; inset: 0; filter: none; backdrop-filter: blur(8px) saturate(1.1) brightness(1.0); -webkit-backdrop-filter: blur(8px) saturate(1.1) brightness(1.0); }
	.frost-tint { background: rgba(233, 226, 218, 0.35); }

	/* Contact overlay — sheet from bottom */
	.contact-overlay { align-items: flex-end; justify-content: stretch; }
	.contact-card { width: 100%; border-radius: 32px 32px 0 0; padding: 40px 24px calc(40px + env(safe-area-inset-bottom)); }
}
	</style>
	<title>Carey Linda Crooks</title>
</head>
<body>

	<!--
		Technique:
		  1. .painting   — sharp image, CSS background, full viewport
		  2. .frost       — blurred copy + warm tint
		  3. .lens-clear  — contains a real <img> positioned so it always
		                    covers the viewport (left/top set per frame in JS).
		                    JS also applies scale(MAG) around the cursor point
		                    for magnification. SVG filter adds glass distortion.
		  No background-attachment:fixed needed — eliminates transform gotcha.
	-->

	<!-- SVG filter: fractal-noise displacement → glass refraction distortion -->
	<svg class="filters-def" xmlns="http://www.w3.org/2000/svg">
		<defs>
			<filter id="glass-distort" x="-8%" y="-8%" width="116%" height="116%" color-interpolation-filters="sRGB">
				<feTurbulence
					type="fractalNoise"
					baseFrequency="0.018 0.014"
					numOctaves="2"
					seed="5"
					result="noise"/>
					
				<feDisplacementMap
					in="SourceGraphic"
					in2="noise"
					scale="16"
					xChannelSelector="R"
					yChannelSelector="G"/>
			</filter>
		</defs>
	</svg>

	<div class="scene" id="scene">

		<!-- Layer 1: sharp painting -->
		<div class="painting"></div>

		<!-- Layer 2: frost -->
		<div class="frost"></div>
		<div class="frost-tint"></div>

		<!-- Name — bottom left, very quiet -->
		<div class="byline">
			<span class="byline-name">Carey Linda Crooks</span>
			<span class="byline-sub">Move to reveal</span>
		</div>

		<!-- Layer 3: the glass cursor -->
		<div class="lens" id="lens" aria-hidden="true">

			<!-- The clear, magnified, distorted window into the painting.
			     The <img> is sized to the viewport and repositioned each
			     frame so its (cx,cy) point lines up with the lens centre.
			     scale(MAG) then zooms into that point. -->
			<div class="lens-clear">
				<img class="lens-img" id="lensImg"
					src="images/PXL_20260223_202538116.RAW-01.COVER (1).jpg"
					alt="" draggable="false">
			</div>

			<!-- Glass sheen — subtle highlight on the lens surface -->
			<div class="lens-sheen"></div>

			<!-- Edge outline — morphs with clip-path via CSS transition on d -->
			<svg class="lens-edge" viewBox="0 0 240 300" fill="none" xmlns="http://www.w3.org/2000/svg">
				<path id="lensEdgePath"
					d="M 120,18 C 162,15 222,95 232,195 C 240,248 218,278 172,282 C 128,286 65,284 22,280 C -15,274 -12,228 15,168 C 38,95 82,20 120,18 Z"
					stroke="rgba(255,255,255,0.55)"
					stroke-width="1.2"
				/>
			</svg>

			<!-- Zone label -->
			<span class="lens-label" id="lensLabel"></span>

		</div>

	</div>

	<!-- Footer cursor zone — transparent strip; z-index 4 above zones, below social-links -->
	<div class="footer-zone"></div>

	<!-- Links — above zones so pointer events reach them -->
	<nav class="social-links">
		<a href="https://substack.com/@careylindacrooks" target="_blank">Substack</a>
	</nav>

	<!-- Click zones — invisible, sit beneath frost, receive pointer events -->
	<a class="zone zone-about"  href="#" aria-label="About"></a>
	<a class="zone zone-design" href="design.html" aria-label="Design and Research"></a>
	<a class="zone zone-art"    href="art.html" aria-label="Art"></a>

	<!-- Gyro prompt — tap-to-enable on touch devices, shown via JS -->
	<div id="gyroPrompt" class="gyro-prompt">Tap to enable tilt</div>

	<!-- About scrim — darkens scene independently of card -->
	<div id="aboutScrim" class="about-scrim"></div>

	<!-- About overlay — glass card popout -->
	<div id="aboutOverlay" class="about-overlay" aria-modal="true" role="dialog" aria-label="About">
		<div class="about-card" id="aboutCard">
			<p class="about-card-text">
				Carey Linda Crooks explores human
				interaction with complex systems working at the
				intersection of technology, ethics, and
				material culture.
			</p>
			<nav class="about-card-links">
			
			</nav>
			<button class="about-commissions-btn" id="openContactFromAbout">Reach out &rarr;</button>
		</div>
	</div>

	<!-- Contact / commission overlay -->
	<div id="contactScrim" class="contact-scrim"></div>
	<div id="contactOverlay" class="contact-overlay" aria-modal="true" role="dialog" aria-label="Start a project">
		<div class="contact-card">
			<iframe data-tally-src="https://tally.so/embed/81dDQY?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1" loading="lazy" width="100%" height="415" frameborder="0" marginheight="0" marginwidth="0" title="Let's Start a Project"></iframe>
		</div>
	</div>

	<!-- Mobile home — Figma 338-554, grouped SVG exports -->
	<div class="mobile-home" id="mobileHome">

		<div class="m-svg" id="bioBlob">
			<img src="images/bio.svg" alt="Carey Linda Crooks explores human interaction with complex systems.">
		</div>

		<a href="design.html" class="m-svg" id="navGroupDesign">
			<img src="images/design.svg" alt="Design &amp; Research Portfolio">
		</a>

		<a href="art.html" class="m-svg" id="navGroupArt">
			<img src="images/art.svg" alt="Art Portfolio">
		</a>

		<button class="m-commissions" id="mobileCommissionsBtn">Reach out &rarr;</button>

	</div>

	<script>var d=document,w="https://tally.so/widgets/embed.js",v=function(){"undefined"!=typeof Tally?Tally.loadEmbeds():d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach((function(e){e.src=e.dataset.tallySrc}))};if("undefined"!=typeof Tally)v();else if(d.querySelector('script[src="'+w+'"]')==null){var s=d.createElement("script");s.src=w,s.onload=v,s.onerror=v,d.body.appendChild(s);}</script>

	<script>
		const lens        = document.getElementById('lens');
		const lensLabel   = document.getElementById('lensLabel');
		const lensImg     = document.getElementById('lensImg');
		const lensClear   = lens.querySelector('.lens-clear');
		const lensSheen   = lens.querySelector('.lens-sheen');
		const lensEdgePath= document.getElementById('lensEdgePath');
		const scene       = document.getElementById('scene');
		const isMobile       = window.matchMedia('(max-width: 768px)').matches;
		const navGroupDesign = document.getElementById('navGroupDesign');
		const navGroupArt    = document.getElementById('navGroupArt');

		// ── Zone shapes ──────────────────────────────────────────────
		// All paths: M + 5×C + Z — same command count enables CSS morph.
		// Each shape echoes a painted form in the source image.
		//
		//  About           — compact centred oval (top-left small ovals)
		//  Design&Research — wide asymmetric organic (big bottom-left oval)
		//  Art             — squarish rounded (right nested rectangles)
		// ─────────────────────────────────────────────────────────────
		const SHAPES = {
			// Compact centred oval — echoes small top-left painted ovals
			'About':
				'M 120,15 C 185,12 226,65 226,148 C 226,228 185,285 120,285 C 55,285 14,228 14,148 C 14,68 55,18 100,15 C 110,14 115,15 120,15 Z',
			// Rounded arrow/triangle — soft apex, gently bowed sides, rounded base corners
			'Design & Research':
				'M 120,10 C 155,8 210,75 218,155 C 228,230 222,272 200,280 C 165,290 55,290 40,280 C 18,272 12,230 22,155 C 30,75 85,8 120,10 Z',
			// Rounded rectangle — near-straight sides, corner arcs
			'Art':
				'M 45,22 C 100,20 170,20 210,22 C 242,24 242,80 242,150 C 242,220 238,268 210,278 C 165,284 90,284 45,278 C 15,272 15,30 45,22 Z'
		};

		const LABEL_POS = {
			'About':             { top: '50%', left: '50%' },
			'Design & Research': { top: '63%', left: '50%' },
			'Art':               { top: '51%', left: '53%' },
		};

		function applyShape(label) {
			const p = SHAPES[label];
			if (!p) return;
			// CSS transition on clip-path handles animation (same command structure)
			lensClear.style.clipPath = `path('${p}')`;
			lensSheen.style.clipPath = `path('${p}')`;
			// CSS transition on SVG d property (Chrome/FF/Safari modern)
			lensEdgePath.style.d = `path("${p}")`;
			// Reposition label to visual centroid of this shape
			const pos = LABEL_POS[label];
			if (pos) {
				lensLabel.style.top  = pos.top;
				lensLabel.style.left = pos.left;
			}
		}

		// Smooth-follow state
		let tx = window.innerWidth  / 2;
		let ty = window.innerHeight / 2;
		let cx = tx, cy = ty;
		let visible = false;
		let overFooter = false;
		let currentLabel = '';

		// Zone labels — keyed to approximate painting regions
		// (painting fills viewport; zones are % of viewport)
		//
		//  ┌──────────────┬──────────────┐
		//  │    About     │    About     │  0–35%
		//  ├──────────────┼──────────────┤
		//  │  Design &    │              │
		//  │  Research    │     Art      │  35–100%
		//  └──────────────┴──────────────┘
		//         0–52%         52–100%

		function getZoneLabel(x, y) {
			const xPct = x / window.innerWidth  * 100;
			const yPct = y / window.innerHeight * 100;
			if (yPct < 36)  return 'About';
			if (xPct < 52)  return 'Design & Research';
			return 'Art';
		}

		document.addEventListener('mousemove', e => {
			tx = e.clientX;
			ty = e.clientY;

			overFooter = e.clientY > window.innerHeight * 0.89;
			if (!visible) visible = true;
			lens.classList.toggle('is-visible', !overFooter);

			const label = getZoneLabel(e.clientX, e.clientY);
			if (label !== currentLabel) {
				currentLabel = label;

				// Morph the glass shape to match the painted form in this zone
				applyShape(label);

				// Crossfade the text label
				lensLabel.classList.add('label-fade');
				setTimeout(() => {
					lensLabel.textContent = label;
					lensLabel.classList.remove('label-fade');
				}, 120);
			}
		});

		// About overlay
		const aboutOverlay = document.getElementById('aboutOverlay');
		const aboutCard    = document.getElementById('aboutCard');
		const aboutScrim   = document.getElementById('aboutScrim');

		function openAbout() {
			aboutScrim.classList.add('is-open');
			aboutOverlay.classList.add('is-open');
		}

		function closeAbout() {
			aboutScrim.classList.remove('is-open');
			aboutOverlay.classList.remove('is-open');
		}

		// Click the scrim (outside card) to close
		aboutScrim.addEventListener('click', closeAbout);

		// Click outside the card (on the overlay backdrop) to close
		aboutOverlay.addEventListener('click', e => {
			if (!aboutCard.contains(e.target)) closeAbout();
		});

		// Contact overlay
		const contactScrim   = document.getElementById('contactScrim');
		const contactOverlay = document.getElementById('contactOverlay');

		function openContact() {
			contactScrim.classList.add('is-open');
			contactOverlay.classList.add('is-open');
		}

		function closeContact() {
			contactScrim.classList.remove('is-open');
			contactOverlay.classList.remove('is-open');
		}

		document.getElementById('openContactFromAbout').addEventListener('click', () => {
			closeAbout();
			openContact();
		});
		contactScrim.addEventListener('click', closeContact);

		// Click outside the card (on the overlay backdrop) to close
		contactOverlay.addEventListener('click', e => {
			if (!e.target.closest('.contact-card')) closeContact();
		});

		// Escape key to close either overlay
		document.addEventListener('keydown', e => {
			if (e.key === 'Escape') { closeAbout(); closeContact(); }
		});

		// Override the zone-about anchor
		document.querySelector('.zone-about').addEventListener('click', e => {
			e.preventDefault();
			openAbout();
		});

		// Click anywhere on the scene → navigate to the current zone (desktop only;
		// on touch devices the zone anchors handle navigation directly)
		if (!window.matchMedia('(hover: none)').matches) {
			scene.addEventListener('click', () => {
				const label = getZoneLabel(cx, cy);
				if (label === 'About')                  openAbout();
				else if (label === 'Design & Research') window.location.href = 'design.html';
				else                                    window.location.href = 'art.html';
			});
		}

		const LENS_W = 240;
		const LENS_H = 300;
		const LERP   = 0.10;
		const MAG    = 1.5;   // magnification factor

		// ── Gentle pebble-float entrance + gyro drift ───────────────
		let blobTX = 0, blobTY = 0;   // gyro target
		const bioBlob  = document.getElementById('bioBlob');
		const commBtn  = document.querySelector('.m-commissions');

		// Blobs start just slightly above/aside — gentle drift into place
		const blobs = [
			{ el: bioBlob,        x:  12, y: -50, vx: 0, vy: 0, rot:  3,  vr: 0, settled: false, delay: 100 },
			{ el: navGroupDesign, x: -10, y: -65, vx: 0, vy: 0, rot: -2,  vr: 0, settled: false, delay: 400 },
			{ el: navGroupArt,    x:   8, y: -55, vx: 0, vy: 0, rot:  2,  vr: 0, settled: false, delay: 650 },
		];

		const DRIFT_K = 0.018;   // very soft spring — slow, dreamy
		const DRIFT_D = 0.94;    // high damping — preserves momentum, gentle deceleration
		const GYRO_K  = 0.06;
		const GYRO_D  = 0.80;
		const startTime = performance.now();
		let allSettled = false;

		function revealCommissions() {
			if (commBtn) commBtn.classList.add('is-visible');
		}

		function tick() {
			cx += (tx - cx) * LERP;
			cy += (ty - cy) * LERP;

			if (!isMobile) {
				const lensLeft = cx - LENS_W / 2;
				const lensTop  = cy - LENS_H / 2;

				lens.style.left = lensLeft + 'px';
				lens.style.top  = lensTop  + 'px';

				const vw = window.innerWidth;
				const vh = window.innerHeight;
				lensImg.style.width  = vw + 'px';
				lensImg.style.height = vh + 'px';
				lensImg.style.left = -lensLeft + 'px';
				lensImg.style.top  = -lensTop  + 'px';
				lensImg.style.transformOrigin = cx + 'px ' + cy + 'px';
				lensImg.style.transform       = 'scale(' + MAG + ')';
			} else {
				const now = performance.now();
				let settledCount = 0;

				for (const b of blobs) {
					if (!b.el) continue;

					const elapsed = now - startTime - b.delay;
					if (elapsed < 0) {
						b.el.style.transform = `translate(${b.x}px,${b.y}px) rotate(${b.rot}deg)`;
						b.el.style.opacity = '0';
						continue;
					}

					// Fade in gently
					const fadeIn = Math.min(1, elapsed / 600);
					b.el.style.opacity = fadeIn.toFixed(3);

					const dist = Math.sqrt(b.x * b.x + b.y * b.y);

					if (!b.settled && dist < 0.3 && Math.abs(b.vx) < 0.05 && Math.abs(b.vy) < 0.05) {
						b.settled = true;
						b.x = 0; b.y = 0; b.rot = 0;
					}

					if (b.settled) {
						settledCount++;
						// Gyro drift after settling
						const gx = b.el === bioBlob ? blobTX * 0.5 : (b.el === navGroupDesign ? blobTX : -blobTX * 0.6);
						const gy = b.el === bioBlob ? blobTY * 0.4 : (b.el === navGroupDesign ? blobTY : blobTY * 0.8);
						b.vx += (gx - b.x) * GYRO_K;  b.vx *= GYRO_D;  b.x += b.vx;
						b.vy += (gy - b.y) * GYRO_K;  b.vy *= GYRO_D;  b.y += b.vy;
						b.rot = 0;
					} else {
						// Gentle float toward (0,0) with subtle lateral sway
						const sway = Math.sin(elapsed / 1000 * 0.8) * 0.04;
						b.vx += (0 - b.x) * DRIFT_K + sway;  b.vx *= DRIFT_D;  b.x += b.vx;
						b.vy += (0 - b.y) * DRIFT_K;          b.vy *= DRIFT_D;  b.y += b.vy;
						b.vr += (0 - b.rot) * DRIFT_K * 0.6;  b.vr *= DRIFT_D;  b.rot += b.vr;
					}

					b.el.style.transform = `translate(${b.x.toFixed(2)}px,${b.y.toFixed(2)}px) rotate(${b.rot.toFixed(2)}deg)`;
				}

				// Reveal commissions once all blobs have settled
				if (!allSettled && settledCount === blobs.length) {
					allSettled = true;
					revealCommissions();
				}
			}

			requestAnimationFrame(tick);
		}
		tick();



		// ── Gyroscope — touch/mobile ──────────────────────────────────
		// Maps device tilt (gamma = left/right, beta = front/back)
		// onto (tx, ty) so the existing lerp+tick loop drives the lens.
		//
		// Comfortable tilt ranges (phone held upright in portrait):
		//   gamma: -25° … +25°  →  viewport left … right
		//   beta:   30° …  75°  →  viewport top  … bottom
		// ─────────────────────────────────────────────────────────────
		const GAMMA_RANGE = 25;
		const BETA_MIN    = 30;
		const BETA_MAX    = 75;

		function handleOrientation(e) {
			const gamma = e.gamma || 0;
			const beta  = e.beta  || 0;

			const g = Math.max(-GAMMA_RANGE, Math.min(GAMMA_RANGE, gamma));
			const b = Math.max(BETA_MIN,     Math.min(BETA_MAX, beta));

			if (isMobile) {
				// Update spring target — tick() applies physics each frame
				blobTX = (g / GAMMA_RANGE) * 14;
				blobTY = ((b - (BETA_MIN + BETA_MAX) / 2) / (BETA_MAX - BETA_MIN)) * 10;
				return;
			}

			tx = ((g + GAMMA_RANGE) / (2 * GAMMA_RANGE)) * window.innerWidth;
			ty = ((b - BETA_MIN)    / (BETA_MAX - BETA_MIN)) * window.innerHeight;

			if (!visible) {
				visible = true;
				lens.classList.add('is-visible');
			}

			const label = getZoneLabel(tx, ty);
			if (label !== currentLabel) {
				currentLabel = label;
				applyShape(label);
				lensLabel.classList.add('label-fade');
				setTimeout(() => {
					lensLabel.textContent = label;
					lensLabel.classList.remove('label-fade');
				}, 120);
			}
		}

		function startGyro(showLens = true) {
			if (showLens) lens.style.display = 'block'; // only show lens on non-mobile
			window.addEventListener('deviceorientation', handleOrientation, true);
			gyroPrompt.classList.add('hidden');
			setTimeout(() => { gyroPrompt.style.display = 'none'; }, 500);
		}

		const gyroPrompt = document.getElementById('gyroPrompt');

		// Mobile commissions button → open contact form
		const mobileCommissionsBtn = document.getElementById('mobileCommissionsBtn');
		if (mobileCommissionsBtn) {
			mobileCommissionsBtn.addEventListener('click', openContact);
		}

		// Only activate on touch/no-hover devices
		if (window.matchMedia('(hover: none)').matches) {
			if (isMobile) {
				// Mobile: gyro floats nav blobs (no lens, no background parallax)
				// Android — auto-start; iOS — request on first tap
				if (typeof DeviceOrientationEvent !== 'undefined' &&
					typeof DeviceOrientationEvent.requestPermission === 'function') {
					document.getElementById('mobileHome').addEventListener('click', () => {
						DeviceOrientationEvent.requestPermission()
							.then(state => { if (state === 'granted') startGyro(false); })
							.catch(() => {});
					}, { once: true });
				} else {
					startGyro(false); // Android auto-start
				}
			} else {
				// Tablet / non-mobile touch — show gyro prompt for lens effect
				gyroPrompt.style.display = 'block';
				gyroPrompt.addEventListener('click', () => {
					if (typeof DeviceOrientationEvent !== 'undefined' &&
						typeof DeviceOrientationEvent.requestPermission === 'function') {
						DeviceOrientationEvent.requestPermission()
							.then(state => { if (state === 'granted') startGyro(); })
							.catch(() => {});
					} else {
						startGyro();
					}
				});
			}
		}
	</script>

</body>
</html>
