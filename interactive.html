<style> 
	.grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 1rem;
    padding: 1rem;
    width: 100%;
    max-width: 100%; /* Ensures it doesn't overflow the parent container */
}

/* Responsive adjustments for different screen sizes */
@media (max-width: 768px) {
    .grid-container {
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
        gap: 0.75rem;
    }
}

@media (max-width: 480px) {
    .grid-container {
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
        gap: 0.5rem;
    }
}

.grid-item {
    background: #FFFDF8;
    padding: 0.5rem;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    text-align: left;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
}

.grid-item:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
}

.image-container {
    position: relative;
    width: 100%;
    padding-bottom: 100%; /* Creates a square container */
    overflow: hidden;
    border-radius: 2px;
}

.grid-item img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
}

.grid-item .title {
    margin-top: 0.5rem;
    font-size: 1rem;
}

/* Title text sizing for smaller screens */
@media (max-width: 480px) {
    .grid-item .title {
        font-size: 0.875rem;
    }
}
</style>
